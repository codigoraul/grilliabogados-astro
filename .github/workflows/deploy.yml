name: Deploy to FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:
  # Disparado por WordPress al publicar/actualizar una noticia
  repository_dispatch:
    types: [wordpress_publish]
  # Respaldo: rebuild diario a las 09:00 Chile (13:00 UTC)
  schedule:
    - cron: '0 13 * * *'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build
        env:
          WP_API_URL: ${{ vars.WP_API_URL || 'https://grilliabogados.cl/admin' }}

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./dist/
          server-dir: prueba/
          dangerous-clean-slate: false
